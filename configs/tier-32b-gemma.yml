# Pylox Systems — Tier 32B Standard (Lead Offering)
# Target: most commercial gigs. L40S 48GB or DGX Spark.
# Base: Gemma 3 27B + LoRA + EAGLE-3

tier: "32b"
base_model: "google/gemma-3-27b-it"
attn_implementation: "sdpa"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  use_dora: true
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_seq_length: 2048
  optim: "paged_adamw_8bit"
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  logging_steps: 10
  save_strategy: "epoch"
  neftune_noise_alpha: 5
  packing: true

liger_kernel:
  enabled: false

eval:
  eval_split_ratio: 0.05
  sample_prompts: 10
  perplexity_baseline: true
  llm_judge_model: "gpt-oss-120b"
  llm_judge_endpoint: "http://localhost:8002/v1"

deploy:
  default_target: "runpod"
  runpod:
    gpu: "NVIDIA L40S"
    vllm_args:
      - "--enable-lora"
      - "--max-lora-rank=32"
      - "--max-loras=6"
      - "--gpu-memory-utilization=0.85"
      - "--enable-prefix-caching"
      - "--quantization=compressed-tensors"
  spark:
    vllm_args:
      - "--enable-lora"
      - "--max-lora-rank=32"
      - "--max-loras=4"
      - "--gpu-memory-utilization=0.55"
      - "--enforce-eager"
      - "--enable-prefix-caching"
  speculative:
    enabled: true
    draft_model: "google/gemma-3-1b-it"
    num_speculative_tokens: 5

eagle3:
  enabled: true
  head_repo: "redhat-ai/gemma-3-27b-eagle3"   # verify repo path on HF before first client run

pricing:
  setup_fee_usd: 7000
  monthly_hosting_usd: 1800
  refresh_fee_usd: 2500
