# Pylox Systems — Tier 8B Standard
# Target: most fine-tune gigs. Runs on any 16GB+ GPU.
# Base: Llama 3.1 8B Instruct + LoRA

tier: "8b"
base_model: "meta-llama/Llama-3.1-8B-Instruct"
attn_implementation: "sdpa"   # "flash_attention_2" or "flash_attention_3" if installed

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  # r=32 + alpha=64 recovers ~80% of DoRA's quality gain while staying
  # vLLM-compatible. Standard alpha = 2*r convention. Adapter file ≈ 160 MB
  # for 8B base — still trivial to ship.
  r: 32
  alpha: 64
  dropout: 0.1                   # Slightly higher than r=16 default to prevent
                                 # overfit on smaller client datasets.
  bias: "none"
  task_type: "CAUSAL_LM"
  use_dora: false                # vLLM does not yet support DoRA at inference time.
                                 # Vanilla LoRA is required for multi-tenant hot-swap.
                                 # Premium single-tenant clients can opt-in via
                                 # `--use-dora` flag + dedicated merged-model serving.
  target_modules:                # All linear layers — maxes adapter expressivity
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_seq_length: 2048
  optim: "paged_adamw_8bit"
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  logging_steps: 10
  save_strategy: "epoch"
  neftune_noise_alpha: 5         # NEFTune — free quality bump on instruction data
  packing: true                  # Packed sequences for 2-3x training throughput

liger_kernel:
  enabled: false                 # Set true if Liger Kernel installed and Blackwell compatible

eval:
  eval_split_ratio: 0.05
  sample_prompts: 10
  perplexity_baseline: true
  llm_judge_model: "gpt-oss-120b"
  llm_judge_endpoint: "http://localhost:8002/v1"

deploy:
  default_target: "runpod"
  runpod:
    gpu: "NVIDIA L4"
    vllm_args:
      - "--enable-lora"
      - "--max-lora-rank=32"
      - "--max-loras=4"               # L4 24GB headroom — fewer concurrent
      - "--max-cpu-loras=16"
      - "--gpu-memory-utilization=0.85"
      - "--enable-prefix-caching"
  spark:
    vllm_args:
      - "--enable-lora"
      - "--max-lora-rank=32"          # match training rank
      - "--max-loras=16"              # multi-tenant: 16 concurrent client adapters
      - "--max-cpu-loras=64"          # off-GPU LoRA cache for fast hot-swap
      - "--gpu-memory-utilization=0.60"
      - "--enforce-eager"             # required on Blackwell sm_121
      - "--enable-prefix-caching"     # huge for repeated system prompts
  speculative:
    enabled: true
    draft_model: "meta-llama/Llama-3.2-1B-Instruct"
    num_speculative_tokens: 5

eagle3:
  enabled: false
  head_repo: null

pricing:
  setup_fee_usd: 3000
  monthly_hosting_usd: 800
  refresh_fee_usd: 1500
